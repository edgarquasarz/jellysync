name: BDD Tests

on: workflow_dispatch # manual only — BDD tests require a real Electron environment, run locally

permissions:
  contents: read

jobs:
  bdd-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Python setuptools (Windows)
        if: matrix.os == 'windows-latest'
        run: pip install setuptools

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm build

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y xvfb libudev-dev

      # Windows does not need xvfb — Electron runs natively
      - name: Run BDD tests
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run --auto-servernum pnpm test:bdd:ci

      - name: Run BDD tests (Windows)
        if: matrix.os == 'windows-latest'
        run: pnpm test:bdd:ci

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bdd-test-results-${{ matrix.os }}
          path: |
            tests/bdd/reports/
            tests/bdd/screenshots/
          retention-days: 30
